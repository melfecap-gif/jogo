<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sudoku Web: Minimalist Edition - Um jogo de lógica clássico com design premium e jogabilidade fluida.">
    <meta name="author" content="Antigravity">
    <title>Sudoku Web: Minimalist Edition</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Sudoku <span class="accent">Web</span></h1>
            <p class="subtitle">Minimalist Edition</p>
        </header>

        <main id="game-container">
            <!-- Difficulty Selection Screen -->
            <section id="selection-screen" class="glass-panel">
                <h2>Escolha a Dificuldade</h2>
                <div class="difficulty-options">
                    <button class="btn btn-difficulty" data-difficulty="easy">Fácil</button>
                    <button class="btn btn-difficulty" data-difficulty="medium">Médio</button>
                    <button class="btn btn-difficulty" data-difficulty="hard">Difícil</button>
                </div>

                <div class="controls-guide">
                    <h3>Como Jogar</h3>
                    <div class="guide-grid">
                        <div class="guide-item">
                            <span class="key">1-9</span>
                            <span class="desc">Insere Números</span>
                        </div>
                        <div class="guide-item">
                            <span class="key">Del</span>
                            <span class="desc">Apaga Número</span>
                        </div>
                        <div class="guide-item">
                            <span class="key">E</span>
                            <span class="desc">Usa Dica</span>
                        </div>
                    </div>
                    <div class="color-guide">
                        <span class="dot success"></span> Correto
                        <span class="dot error"></span> Incorreto
                    </div>
                </div>
            </section>

            <!-- Game Screen (Hidden initially) -->
            <section id="play-screen" class="hidden">
                <div class="game-info">
                    <div class="stat-box hint-counter">
                        <span class="label">Dicas:</span>
                        <span id="hints-remaining" class="value">3</span>
                    </div>
                </div>

                <div id="sudoku-grid" class="grid-9x9">
                    <!-- Cells will be generated by JS -->
                </div>

                <div class="game-controls">
                    <button id="hint-btn" class="btn btn-secondary">Dica (E)</button>
                    <button id="reset-btn" class="btn btn-danger">Recomeçar</button>
                    <button id="back-to-menu-btn" class="btn btn-secondary">Início</button>
                </div>
            </section>
        </main>

        <footer>
            <p>Desenvolvido com <span class="heart">♥</span> por Antigravity</p>
        </footer>
    </div>

    <!-- Victory Modal -->
    <div id="victory-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Parabéns!</h2>
            <p>Você completou o Sudoku com sucesso.</p>
            <button id="new-game-btn" class="btn btn-primary">Novo Jogo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
